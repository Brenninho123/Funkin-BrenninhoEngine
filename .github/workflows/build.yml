name: Build

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      os:
        required: true
        type: string
      buildArgs:
        required: true
        type: string
      artifactName:
        required: true
        type: string
      artifactPath:
        required: true
        type: string

env:
  HAXE_VERSION: 4.3.7
  PROJECT_NAME: BrenninhoEngine
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Cache Haxelib
        uses: actions/cache@v4
        with:
          path: ~/.haxelib
          key: haxelib-${{ inputs.name }}-${{ hashFiles('hmm.json') }}
          restore-keys: |
            haxelib-${{ inputs.name }}-

      - name: Cache Haxe Compiler
        uses: actions/cache@v4
        with:
          path: .haxe-cache
          key: haxe-compiler-${{ inputs.name }}-${{ hashFiles('source/**/*.hx') }}
          restore-keys: |
            haxe-compiler-${{ inputs.name }}-

      - name: Cache HXCPP Build
        uses: actions/cache@v4
        with:
          path: |
            export/release/cpp
            export/debug/cpp
          key: hxcpp-${{ inputs.name }}-${{ hashFiles('source/**/*.hx', 'Project.xml') }}
          restore-keys: |
            hxcpp-${{ inputs.name }}-

      - name: Install libVLC
        if: inputs.name == 'Linux'
        run: sudo apt-get install -y libvlc-dev libvlccore-dev

      - name: Setup Xcode
        if: inputs.name == 'iOS'
        uses: maxim-lobanov/setup-xcode@master
        with:
          xcode-version: '16.4'

      - name: Install Libraries
        run: |
          haxelib install hmm --quiet
          haxelib run hmm install --quiet

      - name: Accept Android SDK Licenses
        if: inputs.name == 'Android'
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Configure Android
        if: inputs.name == 'Android'
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME_17_arm64
          haxelib run lime config ANDROID_SETUP true

      - name: Set Compiler Threads
        shell: bash
        run: |
          if [ "${{ inputs.name }}" = "Linux" ] || [ "${{ inputs.name }}" = "Android" ]; then
            CPUS=$(nproc)
          else
            CPUS=$(sysctl -n hw.logicalcpu)
          fi
          echo "CPUS=$CPUS" >> $GITHUB_ENV
          echo "Using $CPUS threads for compilation"

      - name: Compile
        run: haxelib run lime build ${{ inputs.buildArgs }} -DHXCPP_COMPILE_THREADS=${{ env.CPUS }} -DHXCPP_OPTIMIZE_FOR_CPUID=1

      - name: Make IPA
        if: inputs.name == 'iOS'
        run: |
          cd export/release/ios/build/Release-iphoneos
          mkdir -p Payload
          mv *.app Payload
          zip -r ${{ env.PROJECT_NAME }}.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ inputs.artifactName }}
          path: ${{ inputs.artifactPath }}
          if-no-files-found: error

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@main
        with:
          name: build-logs-${{ inputs.name }}
          path: |
            export/*/cpp/build/**.log
            *.log
          if-no-files-found: ignore